<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINK+ / SCCL / SMCL 中文图书豆瓣评分排行</title>
<link rel="stylesheet" href="books_ranked.css">
</head>
<body>
<div class="container">
  <header>
    <h1>LINK+ / SCCL / SMCL 中文图书豆瓣评分排行</h1>
    <p>大陆出版 &middot; 2000年至今 &middot; 共 12671 本有评分图书 &middot; 更新于 2026-03-18 20:58</p>
  </header>

  <div class="search-row">
    <input type="text" id="search" placeholder="搜索书名、作者、出版社..." autocomplete="off">
    <button class="adv-toggle" id="advToggle">
      高级筛选 <span class="arrow">▼</span>
      <span class="adv-badge" id="advBadge">0</span>
    </button>
    <span class="stats" id="stats"></span>
  </div>

  <div class="adv-panel" id="advPanel">
    <div class="adv-grid">
      <div class="adv-group">
        <label>评分范围</label>
        <div class="range-row">
          <input type="number" id="ratingMin" placeholder="最低" min="0" max="10" step="0.1">
          <span class="range-sep">—</span>
          <input type="number" id="ratingMax" placeholder="最高" min="0" max="10" step="0.1">
        </div>
      </div>
      <div class="adv-group">
        <label>最少评分人数</label>
        <div class="range-row">
          <input type="number" id="countMin" placeholder="例: 100" min="0" step="1">
        </div>
      </div>
      <div class="adv-group">
        <label>出版年份</label>
        <div class="range-row">
          <input type="number" id="yearMin" placeholder="起始" min="2000" max="2030" step="1">
          <span class="range-sep">—</span>
          <input type="number" id="yearMax" placeholder="结束" min="2000" max="2030" step="1">
        </div>
      </div>
      <div class="adv-group">
        <label>标签</label>
        <select id="tagFilter"><option value="">全部标签</option></select>
      </div>
      <div class="adv-group">
        <label>图书馆</label>
        <div class="check-row">
          <input type="checkbox" id="libLinkplus" checked>
          <label class="check-label" for="libLinkplus">LINK+</label>
          <input type="checkbox" id="libSccl" checked>
          <label class="check-label" for="libSccl">SCCL</label>
          <input type="checkbox" id="libSmcl" checked>
          <label class="check-label" for="libSmcl">SMCL</label>
        </div>
      </div>
      <div class="adv-group">
        <label>特殊</label>
        <div class="check-row">
          <input type="checkbox" id="honorOnly">
          <label class="check-label" for="honorOnly">仅显示有榜单荣誉的图书</label>
        </div>
      </div>
    </div>
    <div class="adv-actions">
      <button class="btn-clear" id="advClear">清除全部</button>
      <button class="btn-apply" id="advApply">应用筛选</button>
    </div>
  </div>

  <div class="toolbar">
    <div class="page-size">
      <label for="pageSize">每页</label>
      <select id="pageSize">
        <option value="50">50</option>
        <option value="100" selected>100</option>
        <option value="200">200</option>
        <option value="0">全部</option>
      </select>
      <span>条</span>
    </div>
    <div class="pagination" id="paginationTop"></div>
  </div>

  <table>
    <thead>
      <tr>
        <th data-col="rank" class="sorted-asc">#</th>
        <th data-col="title">书名</th>
        <th data-col="author">作者</th>
        <th data-col="year">年份</th>
        <th data-col="rating">评分</th>
        <th data-col="count">评分人数</th>
        <th>标签</th>
        <th data-col="isbn">ISBN</th>
        <th>链接</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="pagination" id="paginationBottom"></div>
</div>

<!-- Book detail modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-card">
    <button class="modal-close" id="modalClose">&times;</button>
    <div class="modal-header">
      <img class="modal-cover" id="modalCover" src="" alt="">
      <div class="modal-info">
        <div class="modal-honors" id="modalHonors"></div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-subtitle" id="modalSubtitle"></div>
        <div class="modal-meta" id="modalMeta"></div>
        <div class="modal-rating-row" id="modalRating"></div>
      </div>
    </div>
    <div class="modal-section" id="modalIntroSection">
      <div class="modal-section-title">内容简介</div>
      <div class="modal-intro" id="modalIntro"></div>
    </div>
    <div class="modal-section" id="modalTagsSection">
      <div class="modal-section-title">标签</div>
      <div class="modal-tags" id="modalTags"></div>
    </div>
    <div class="modal-links" id="modalLinks"></div>
  </div>
</div>

<script>
// Image proxy config: set your Cloudflare Worker URL here for production.
// Local dev (serve.py) uses the default '/douban-img/'.
window.IMG_PROXY_BASE = 'https://douban-img-proxy.shaohenz-usc.workers.dev/';
</script>
<script src="books_data.js"></script>
<script src="books_ranked.js"></script>
</body>
</html>
